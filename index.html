<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather - Persona 5 Style</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700;900&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Main Container -->
    <div class="container">
        <!-- Background Cityscape -->
        <div class="cityscape-bg"></div>
        <div class="cityscape-night-overlay"></div>

        <!-- Animated Clouds -->
        <div class="clouds-layer" id="cloudsLayer"></div>

        <!-- Date Display -->
        <div class="date-container">
            <div class="date-cards-wrapper" id="dateCardsWrapper"></div>
        </div>

        <div class="weather-ui"></div>

    </div>

    <!-- GSAP for smooth animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="module" src="./js/app.js"></script>
</body>

</html>
